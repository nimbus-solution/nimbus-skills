name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rebuild dist/ + manifest.json
        run: node scripts/build.mjs
      - name: Verify generated artifacts are up to date
        run: |
          if ! git diff --quiet dist/ manifest.json; then
            echo "::error::Generated files are out of sync with skills/. Run 'node scripts/build.mjs' and commit the result."
            git diff dist/ manifest.json
            exit 1
          fi
